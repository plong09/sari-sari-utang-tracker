databases:
  - name: sari-sari-utang-db
    plan: basic-256mb
    databaseName: sari_sari_utang
    user: sari_sari_utang

services:
  - type: web
    name: sari-sari-utang-tracker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: USER_NAME
        sync: false
      - key: PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sari-sari-utang-db
          property: connectionString
