services:
  - type: web
    name: sari-sari-utang-tracker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /healthz
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: USER_NAME
        sync: false
      - key: PASSWORD
        sync: false
      - key: DATABASE_PATH
        value: /var/data/database.db
