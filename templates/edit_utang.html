<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Utang</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="edit-page">
  <div class="edit-card">
    <a href="/customer/{{ customer_id }}" class="back-link">Back</a>

    <h1>Edit Utang</h1>
    <p>Update item, quantity, or price.</p>

    <form method="POST">
      <label>Item</label>
      <select name="item_name" id="editItemSelect" required>
        {% for product in products %}
          <option value="{{ product[1] }}"
                  data-price="{{ product[2] }}"
                  {% if product[1] == utang[2] %}selected{% endif %}>
            {{ product[1] }}
          </option>
        {% endfor %}
      </select>

      <label>Quantity</label>
      <input type="number" name="quantity" id="editQty" value="{{ utang[3] }}" min="1" required>

      <label>Price</label>
      <input type="text" name="price" id="editPrice" value="{{ utang[4] }}" required>

      <label>Total</label>
      <input type="text" id="editTotal" value="{{ "%.2f"|format(utang[5]) }}" readonly>

      <div class="edit-summary">
        <p>Already paid: <b>&#8369;{{ "%.2f"|format(utang[8]) }}</b></p>
        <p>Status: <b>{{ utang[6] }}</b></p>
      </div>

      <button class="green-btn" type="submit">Save Changes</button>
    </form>
  </div>
</div>

<script>
const item = document.getElementById("editItemSelect");
const qty = document.getElementById("editQty");
const price = document.getElementById("editPrice");
const total = document.getElementById("editTotal");

function compute(){
  const q = parseInt(qty.value) || 0;
  const p = parseFloat(price.value) || 0;
  total.value = (q * p).toFixed(2);
}

item.addEventListener("change", ()=>{
  const selected = item.options[item.selectedIndex];
  price.value = selected.getAttribute("data-price");
  compute();
});

qty.addEventListener("input", compute);
price.addEventListener("input", compute);
</script>

</body>
</html>
