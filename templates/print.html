<!DOCTYPE html>
<html>
<head>
  <title>Receipt</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: white;
      padding: 30px;
    }

    .receipt {
      max-width: 380px;
      margin: auto;
      border: 1px solid #ddd;
      padding: 20px;
    }

    h2, .center {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px dashed #999;
      font-size: 14px;
      text-align: left;
    }

    .total {
      text-align: right;
      margin-top: 18px;
      font-size: 18px;
      font-weight: bold;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      cursor: pointer;
    }

    @media print {
      button {
        display: none;
      }
    }
  </style>
</head>
<body>

<div class="receipt">
  <h2>Sari-Sari Store</h2>
  <p class="center">Utang Receipt</p>

  <p><b>Customer:</b> {{ customer[1] }}</p>

  <table>
    <tr>
      <th>Item</th>
      <th>Qty</th>
      <th>Total</th>
    </tr>

    {% for u in utang_list %}
    <tr>
      <td>{{ u[2] }}</td>
      <td>{{ u[3] }}</td>
      <td>₱{{ "%.2f"|format(u[5]) }}</td>
    </tr>
    {% endfor %}
  </table>

  <div class="total">
    Total: ₱{{ "%.2f"|format(total) }}
  </div>

  <button onclick="window.print()">Print Receipt</button>
</div>

</body>
</html>
